name: CI Build

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [development]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # 📥 CHECKOUT
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🟢 NODE SETUP
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 📦 INSTALL
      - name: Install Dependencies
        run: npm ci

      # 🔍 SONARCLOUD SCAN
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=steigen-testing
            -Dsonar.projectKey=ThirupathiReddyB_healthcare-frontend
            -Dsonar.projectName=healthcare-frontend
            -Dsonar.sources=.
            -Dsonar.exclusions=prisma/migrations/**,prisma/seed.ts

      # 🛑 QUALITY GATE (FAIL PIPELINE IF BAD CODE)
      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 🌐 ENV SETUP
      - name: Create env file
        run: echo "VITE_BASE_URL=${{ vars.DEV_VITE_BASE_URL }}" > .env

      # 🏗 BUILD
      - name: Build
        run: npm run build

      # 📦 ZIP ARTIFACT
      - name: Zip build
        run: zip -r build-${{ github.run_number }}.zip dist

      # 🔐 AWS LOGIN (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.REGION }}

      # ☁️ UPLOAD TO S3
      - name: Upload to S3
        run: |
          aws s3 cp build-${{ github.run_number }}.zip \
          s3://${{ vars.ARTIFACT_BUCKET }}/builds/

      # 🧾 OUTPUT
      - name: Output artifact
        run: echo "Artifact = build-${{ github.run_number }}.zip"