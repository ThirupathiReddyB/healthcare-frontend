name: CI Build

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [development]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: CI_Environments

    steps:
      # 📥 CHECKOUT
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🟢 NODE SETUP
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 INSTALL
      - name: Install Dependencies
        run: npm install

      # 🔍 SONAR SCAN (HARDCODED - NO OVERRIDE ISSUES)
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: 488a0d25d471ae5f71b589013bd9c6c83d9e55d7
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=thirupathi-reddy
            -Dsonar.projectKey=thirupathi-reddy_thito-testing
            -Dsonar.branch.name=development
            -Dsonar.sources=.
            -Dsonar.exclusions=prisma/migrations/**,prisma/seed.ts

      # ⏳ WAIT (FIXES 403 TIMING ISSUE)
      - name: Wait for Sonar processing
        run: sleep 30

      # 🚨 QUALITY GATE
      - name: Sonar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: 488a0d25d471ae5f71b589013bd9c6c83d9e55d7

      # 🌐 ENV SETUP
      - name: Create env file
        run: echo "VITE_BASE_URL=${{ vars.DEV_VITE_BASE_URL }}" > .env

      # 🏗 BUILD
      - name: Build App
        run: npm run build

      # 📦 ZIP ARTIFACT
      - name: Zip build
        run: zip -r build-${{ github.run_number }}.zip dist

      # 🔐 AWS LOGIN (OIDC)
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.REGION }}

      # ☁️ UPLOAD TO S3
      - name: Upload to S3
        run: |
          aws s3 cp build-${{ github.run_number }}.zip \
          s3://${{ vars.ARTIFACT_BUCKET }}/builds/

      # 🧾 OUTPUT
      - name: Print artifact name
        run: echo "Artifact = build-${{ github.run_number }}.zip"